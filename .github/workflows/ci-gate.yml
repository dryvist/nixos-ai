# CI Gate — thin consumer of the dryvist hub reusable workflow.
#
# All check logic lives in dryvist/.github `_ci-gate.yml` (change detection,
# conditional checks, queue watchdog, and the aggregating "Merge Gate" job).
# Branch protection should require ONLY the "Merge Gate" check.

name: CI Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  gate:
    permissions:
      contents: read
      pull-requests: read
      actions: write # hub Queue Watchdog cancels stuck queued sibling jobs
    uses: dryvist/.github/.github/workflows/_ci-gate.yml@686064224dfa7487ea1bf8bdddd0e87bad93f323 # main
    with:
      nix_validate: true
      # dev-hygiene's treefmt/pre-commit checks build real per-system tool
      # derivations (statix, etc.) for every declared system, including
      # aarch64-darwin — which the linux runner can't build ("platform
      # mismatch"). Matches nix-claude-code's ci.yml, the other dev-hygiene
      # consumer in this org.
      all_systems: false
      markdown_lint: true
      file_size: true
      filters: |
        nix:
          - '**.nix'
          - 'flake.lock'
        markdown:
          - '**.md'
          - '.markdownlint*'
