# Copy of the dryvist/.github canonical .markdownlint-cli2.yaml.
# Source of truth: https://github.com/dryvist/.github/blob/main/.markdownlint-cli2.yaml
# Sync mechanism: manual for now; Renovate custom manager TBD.
#
# Schema: https://github.com/DavidAnson/markdownlint-cli2/blob/main/schema/markdownlint-cli2-config-schema.json

config:
  MD013:
    line_length: 160
    tables: true
    strict: true
    # `heading_line_length` and `code_block_line_length` deliberately not set.
    # An 80-character ceiling is an anti-pattern for modern displays.

# Per-file overrides. MD024 is global-strict by default and only relaxed
# where release-please's auto-generated content forces duplicate headings.
overrides:
  - files:
      - "CHANGELOG.md"
    config:
      MD024:
        siblings_only: true
      MD013: false
      MD012: false
